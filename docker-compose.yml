services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: manage-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=SqlServer2024!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - manage-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "SqlServer2024!" -Q "SELECT 1" -C || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: manage-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DBConnection=Server=sqlserver,1433;Database=ManageEmployees;User Id=sa;Password=SqlServer2024!;TrustServerCertificate=True;Encrypt=False;
    ports:
      - "64715:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - manage-network

  frontend:
    build:
      context: ../ManageEmployees.Front
      dockerfile: Dockerfile
    container_name: manage-frontend
    environment:
      - NEXT_PUBLIC_BASE_URL=http://localhost:64715/
      - NEXT_PUBLIC_SECRET_ENCRYPT_KEY=@my-secret-key-@
      - NEXT_PUBLIC_VERSAO=1.0.0
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - manage-network

volumes:
  sqlserver_data:
    driver: local

networks:
  manage-network:
    driver: bridge
